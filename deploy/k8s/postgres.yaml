apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ct-postgres-data
  namespace: tabularis
spec:
  accessModes: ['ReadWriteOnce']
  storageClassName: local-path
  resources:
    requests:
      storage: 3Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ct-postgres
  namespace: tabularis
  labels: { app: ct-postgres }
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector:
    matchLabels: { app: ct-postgres }
  template:
    metadata:
      labels: { app: ct-postgres }
    spec:
      containers:
        - name: postgres
          image: postgres:17-alpine
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef: { name: ct-postgres-secret }
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec: { command: ['pg_isready', '-U', 'ct'] }
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim: { claimName: ct-postgres-data }
---
apiVersion: v1
kind: Service
metadata:
  name: ct-postgres
  namespace: tabularis
spec:
  selector: { app: ct-postgres }
  ports:
    - port: 5432
      targetPort: 5432
