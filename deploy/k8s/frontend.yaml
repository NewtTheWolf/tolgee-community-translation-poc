apiVersion: apps/v1
kind: Deployment
metadata:
  name: ct-frontend
  namespace: tabularis
  labels: { app: ct-frontend }
spec:
  replicas: 1
  selector:
    matchLabels: { app: ct-frontend }
  template:
    metadata:
      labels: { app: ct-frontend }
    spec:
      containers:
        - name: frontend
          image: ct-frontend:v1
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: '3000'
          readinessProbe:
            tcpSocket: { port: 3000 }
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            tcpSocket: { port: 3000 }
            initialDelaySeconds: 10
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: ct-frontend
  namespace: tabularis
spec:
  selector: { app: ct-frontend }
  ports:
    - port: 3000
      targetPort: 3000
